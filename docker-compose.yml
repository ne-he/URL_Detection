services:
  backend:
    build: ./backend
    ports:
      - "7860:7860"
    environment:
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:5173,http://localhost:3000}
      PHISHING_THRESHOLD: ${PHISHING_THRESHOLD:-0.5}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:7860/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3

  frontend:
    build: .
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:7860}
    depends_on:
      - backend
